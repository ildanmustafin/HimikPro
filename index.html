<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MirrorMaker</title>

<style>
body{margin:0;font-family:-apple-system;background:#f3fbff;}

header{
background:linear-gradient(135deg,#00bcd4,#007c91);
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:700;
cursor:pointer;
}

.container{padding:15px;}

.card{
background:white;
border-radius:18px;
padding:15px;
margin-bottom:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.06);
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#00bcd4,#007c91);
color:white;
font-size:15px;
margin-top:10px;
}

input,select{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
margin-top:10px;
box-sizing:border-box;
}

.event{
padding:6px;
border-bottom:1px solid #eee;
}

.highlight{
background:#e0f7fa;
border-left:5px solid #00bcd4;
font-weight:600;
white-space:pre-line;
}

.lunch{
background:#e8f5e9;
border-left:5px solid #4caf50;
white-space:pre-line;
}

img{width:100%;border-radius:12px;margin-top:10px;}

.task{
display:flex;
justify-content:space-between;
align-items:center;
margin:10px 0;
padding:8px 0;
border-bottom:1px solid #eee;
}

.switch{
position:relative;
width:46px;
height:24px;
}

.switch input{display:none;}

.slider{
position:absolute;
top:0;left:0;right:0;bottom:0;
background:#ccc;
border-radius:30px;
}

.slider:before{
content:"";
position:absolute;
width:18px;height:18px;
left:3px;bottom:3px;
background:white;
border-radius:50%;
transition:.3s;
}

input:checked + .slider{
background:#00bcd4;
}

input:checked + .slider:before{
transform:translateX(22px);
}
</style>
</head>

<body>

<header onclick="goHome()">MirrorMaker</header>
<div class="container" id="app"></div>

<script>

/* ---------- НАВИГАЦИЯ ---------- */
function goHome(){renderHome();}

/* ---------- ГЛАВНОЕ МЕНЮ ---------- */
function renderHome(){
app.innerHTML=`
<div class="card"><button onclick="renderChemShift()">Химик</button></div>
<div class="card"><button onclick="renderOperator()">Оператор загрузки/выгрузки</button></div>
<div class="card"><button onclick="renderPaint()">Краска</button></div>
<div class="card"><button onclick="renderSamples()">Образцы</button></div>
<div class="card"><button onclick="renderLine()">Устройство линии</button></div>
`;
}

/* ---------- TASKS ---------- */
function loadTasks(defaultTasks=[]){

let t = JSON.parse(localStorage.getItem("tasks")||"null");

if(!Array.isArray(t)){
t=defaultTasks;
localStorage.setItem("tasks",JSON.stringify(t));
}

document.getElementById("tasks").innerHTML=
t.map((x,i)=>`
<div class="task">
<span>${x.n}</span>
<label class="switch">
<input type="checkbox" ${x.d?"checked":""} onchange="toggleTask(${i})">
<span class="slider"></span>
</label>
</div>
`).join("");
}

function addTask(){
let v=document.getElementById("newTask").value;
if(!v)return;

let t=JSON.parse(localStorage.getItem("tasks")||"[]");
t.push({n:v,d:false});
localStorage.setItem("tasks",JSON.stringify(t));
document.getElementById("newTask").value="";
loadTasks();
}

function toggleTask(i){
let t=JSON.parse(localStorage.getItem("tasks")||"[]");
t[i].d=!t[i].d;
localStorage.setItem("tasks",JSON.stringify(t));
loadTasks();
}

/* ---------- ХИМИК ---------- */
let shiftStart=0,shiftEnd=1440;

function renderChemShift(){
app.innerHTML=`
<div class="card">
<h3>Выбор смены</h3>
<select id="shift">
<option value="7-15">07:00 - 15:00</option>
<option value="15-23">15:00 - 23:00</option>
<option value="23-7">23:00 - 07:00</option>
<option value="9-21">09:00 - 21:00</option>
<option value="21-9">21:00 - 09:00</option>
</select>
<button onclick="startChem()">Сохранить смену</button>
</div>`;
}

function startChem(){
let map={
"7-15":[7,15],
"15-23":[15,23],
"23-7":[23,7],
"9-21":[9,21],
"21-9":[21,9]
};

let val=document.getElementById("shift").value;
let s=map[val];

shiftStart=s[0]*60;
shiftEnd=s[1]*60;
if(shiftEnd<=shiftStart) shiftEnd+=1440;

renderChem();
}

/* ---------- РЕНДЕР ХИМИКА ---------- */
function renderChem(){
app.innerHTML=`
<div class="card">
<h3>Задачи</h3>
<div id="tasks"></div>
<input type="text" id="newTask" placeholder="Новая задача">
<button onclick="addTask()">Добавить задачу</button>
</div>
`;

loadTasks([
{n:"Соль",d:false},
{n:"Щелочь",d:false},
{n:"Шлам",d:false}
]);
}

/* ---------- ОПЕРАТОР ---------- */
function renderOperator(){
localStorage.removeItem("tasks"); // убираем базовые задачи

app.innerHTML=`
<div class="card">
<h3>Задачи</h3>
<div id="tasks"></div>
<input type="text" id="newTask" placeholder="Новая задача">
<button onclick="addTask()">Добавить задачу</button>
</div>
`;

loadTasks([]); // только новые
}

/* ---------- КРАСКА ---------- */
function renderPaint(){
localStorage.removeItem("tasks");

app.innerHTML=`
<div class="card">
<h3>Задачи</h3>
<div id="tasks"></div>
<input type="text" id="newTask" placeholder="Новая задача">
<button onclick="addTask()">Добавить задачу</button>
</div>
`;

loadTasks([]);
}

/* ---------- ОБРАЗЦЫ ---------- */
function renderSamples(){
app.innerHTML=`<div class="card"><img src="k3.jpg"></div>`;
}

/* ---------- ЛИНИЯ ---------- */
function renderLine(){
app.innerHTML=`<div class="card"><img src="k1.jpg"></div>`;
}

/* ---------- START ---------- */
renderHome();

</script>

</body>
</html>
