<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MirrorMaker</title>

<style>
body{margin:0;font-family:-apple-system;background:#f3fbff;}

header{
background:linear-gradient(135deg,#00bcd4,#007c91);
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:700;
cursor:pointer;
}

.container{padding:15px;}

.card{
background:white;
border-radius:18px;
padding:15px;
margin-bottom:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.06);
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#00bcd4,#007c91);
color:white;
font-size:15px;
margin-top:10px;
}

input,select{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
margin-top:10px;
box-sizing:border-box;
}

.event{
padding:6px;
border-bottom:1px solid #eee;
}

.highlight{
background:#e0f7fa;
border-left:5px solid #00bcd4;
white-space:pre-line;
}

.lunch{
background:#e8f5e9;
border-left:5px solid #4caf50;
white-space:pre-line;
}

img{width:100%;border-radius:12px;margin-top:10px;}

.task{
display:flex;
justify-content:space-between;
align-items:center;
margin:10px 0;
padding:8px 0;
border-bottom:1px solid #eee;
}

.switch{position:relative;width:46px;height:24px;}
.switch input{display:none;}

.slider{
position:absolute;
top:0;left:0;right:0;bottom:0;
background:#ccc;
border-radius:30px;
}

.slider:before{
content:"";
position:absolute;
width:18px;height:18px;
left:3px;bottom:3px;
background:white;
border-radius:50%;
transition:.3s;
}

input:checked + .slider{background:#00bcd4;}
input:checked + .slider:before{transform:translateX(22px);}

.task-del{
margin-right:10px;
color:#aaa;
font-size:16px;
cursor:pointer;
user-select:none;
}

.task-del:hover{
color:#666;
}

</style>
</head>

<body>

<header onclick="goHome()">MirrorMaker</header>
<div class="container" id="app"></div>

<script>

function goHome(){renderHome();}

function renderHome(){
app.innerHTML=`
<div class="card"><button onclick="renderChemShift()">Химик</button></div>
<div class="card"><button onclick="renderOperator()">Оператор загрузки/выгрузки</button></div>
<div class="card"><button onclick="renderPaint()">Краска</button></div>
<div class="card"><button onclick="renderSamples()">Образцы</button></div>
<div class="card"><button onclick="renderLine()">Устройство линии</button></div>
`;
}

let shiftStart=0,shiftEnd=1440;

function renderChemShift(){
app.innerHTML=`
<div class="card">
<h3>Выбор смены</h3>
<select id="shift">
<option value="7-15">07:00 - 15:00</option>
<option value="15-23">15:00 - 23:00</option>
<option value="23-7">23:00 - 07:00</option>
<option value="9-21">09:00 - 21:00</option>
<option value="21-9">21:00 - 09:00</option>
</select>
<button onclick="startChem()">Сохранить смену</button>
</div>`;
}

function startChem(){
let map={
"7-15":[7,15],
"15-23":[15,23],
"23-7":[23,7],
"9-21":[9,21],
"21-9":[21,9]
};

let s=map[document.getElementById("shift").value];
shiftStart=s[0]*60;
shiftEnd=s[1]*60;
if(shiftEnd<=shiftStart) shiftEnd+=1440;

renderChem();
}

function fmt(min){
min=((min%1440)+1440)%1440;
return String(Math.floor(min/60)).padStart(2,'0')+":"+String(min%60).padStart(2,'0');
}

function toMin(t){
let [h,m]=t.split(":").map(Number);
return h*60+m;
}

function setChem(){
let t=document.getElementById("chemTime").value;
if(!t)return;
let start=toMin(t);
if(start<shiftStart) start+=1440;

let arr=[];
for(let i=0;i<6;i++){
let time=start+i*240;
if(time>shiftEnd) break;
arr.push({time:fmt(time),text:"Приготовить химию"});
}
localStorage.setItem("chem",JSON.stringify(arr));
renderChemData();
}

function setSilan(){
let t=document.getElementById("silanTime").value;
if(!t)return;
let start=toMin(t);
if(start<shiftStart) start+=1440;

let arr=[];
for(let i=0;i<10;i++){
let base=start+i*180;
if(base>shiftEnd) break;
arr.push({time:fmt(base),text:"Приготовить силан"});
arr.push({time:fmt(base+40),text:"Зарядить силан"});
}
localStorage.setItem("silan",JSON.stringify(arr));
renderChemData();
}

function lunch(){
let ev=[];
(JSON.parse(localStorage.getItem("chem")||"[]"))
.forEach(e=>ev.push({s:toMin(e.time),e:toMin(e.time)+20}));
(JSON.parse(localStorage.getItem("silan")||"[]"))
.forEach(e=>{
let d=e.text.includes("Приготовить")?10:5;
ev.push({s:toMin(e.time),e:toMin(e.time)+d});
});

ev.sort((a,b)=>a.s-b.s);

let gaps=[];
for(let i=0;i<ev.length-1;i++){
let g=ev[i+1].s-ev[i].e;
if(g>=50) gaps.push({s:ev[i].e,e:ev[i+1].s});
}

if(!gaps.length) return "Нет времени на обед";
return gaps.slice(0,3).map(x=>`${fmt(x.s)} — ${fmt(x.e)}`).join("\n");
}

function loadTasks(){
let t=JSON.parse(localStorage.getItem("tasksChem")||"null");
if(!Array.isArray(t)){
t=[{n:"Соль",d:false},{n:"Щелочь",d:false},{n:"Шлам",d:false}];
localStorage.setItem("tasksChem",JSON.stringify(t));
}

document.getElementById("tasks").innerHTML=
t.map((x,i)=>`
<div class="task">
<span>${x.n}</span>
<label class="switch">
<input type="checkbox" ${x.d?"checked":""} onchange="toggleTask(${i})">
<span class="slider"></span>
</label>
</div>`).join("");
}

function addTask(){
let v=document.getElementById("newTask").value;
if(!v)return;
let t=JSON.parse(localStorage.getItem("tasksChem")||"[]");
t.push({n:v,d:false});
localStorage.setItem("tasksChem",JSON.stringify(t));
document.getElementById("newTask").value="";
loadTasks();
}

function toggleTask(i){
let t=JSON.parse(localStorage.getItem("tasksChem")||"[]");
t[i].d=!t[i].d;
localStorage.setItem("tasksChem",JSON.stringify(t));
loadTasks();
}

function renderChem(){
app.innerHTML=`
<div class="card">
<h3>Химия</h3>
<input type="time" id="chemTime">
<button onclick="setChem()">Рассчитать</button>
<div id="chemResult"></div>
</div>

<div class="card">
<h3>Силан</h3>
<input type="time" id="silanTime">
<button onclick="setSilan()">Рассчитать</button>
<div id="silanResult"></div>
</div>

<div class="card lunch">
<h3>Возможное время для обеда</h3>
<div id="lunchResult"></div>
</div>

<div class="card">
<h3>Задачи</h3>
<div id="tasks"></div>
<input type="text" id="newTask" placeholder="Новая задача">
<button onclick="addTask()">Добавить задачу</button>
</div>

<div class="card highlight">
ВАЖНО: Готовить порошок и доливать серебро в течение всей смены! Следить за системой EnviroFalk и EnvoChem
</div>

<div class="card"><img src="k2.jpg"></div>

<div class="card">
<button onclick="renderChemShift()">Новая смена</button>
</div>
`;

renderChemData();
loadTasks();
}

function renderChemData(){
document.getElementById("chemResult").innerHTML=
(JSON.parse(localStorage.getItem("chem")||"[]"))
.map(e=>`<div class="event">${e.time} — ${e.text}</div>`).join("");

document.getElementById("silanResult").innerHTML=
(JSON.parse(localStorage.getItem("silan")||"[]"))
.map(e=>`<div class="event">${e.time} — ${e.text}</div>`).join("");

document.getElementById("lunchResult").innerText=lunch();
}

function renderOperator(){
app.innerHTML=`
<div class="card">
<h3>Задачи</h3>
<div id="tasks"></div>
<input type="text" id="newTask" placeholder="Новая задача">
<button onclick="addTaskOperator()">Добавить задачу</button>
</div>

<div class="card highlight">
<b>Вывод робота в ручной режим</b>
Выбрать режим “T1” > R > Аннулировать программу > Выбрать формат стекла / Готово
</div>

<div class="card highlight">
На стопе должен быть прикреплен ярлык с информацией о количестве листов, номере смены, даты изготовления, с штампом ОТК
</div>

<div class="card highlight">
<b>Инструкция по роботу загрузки если встанет с двойным стеклом</b>
Переводите в ручной режим, в программе ищете строчку
157, выбираете «block selection», далее по оси Y отводите робота вместе с одним стеклом подальше от стопы, далее ищете строчку 5, нажимаете «block selection», выполняете, робот встаёт в домашнюю позицию с одним стеклом, далее ищете строчку 103, нажимаете «block selection», он переворачивается с одним стеклом, далее вручную ставите в стопу оставшееся стекло, нажимаете на присоску, чтобы сбросить. При необходимости заходите и двигаете стекло в стопе. Далее ищете строчку 5, нажимаете «block selection», робот выходит на домашнюю позицию, переводите в авто режим, запускаете.
</div>
`;
loadTasksOperator();
}

function renderPaint(){
app.innerHTML=`
<div class="card">
<h3>Задачи</h3>
<div id="tasks"></div>
<input type="text" id="newTask" placeholder="Новая задача">
<button onclick="addTaskPaint()">Добавить задачу</button>
</div>

<div class="card highlight">
<b>Инструкция по приготовлению краски</b>
Миксер на 2 часа на 25Гц
Измерить вязкость, добавить ксилол
Миксер на 1,5 часа на 20Гц
Измерить вязкость, добавить ксилол
Миксер на 1,5 часа на 20Гц
Измерить вязкость, добавить ксилол
Миксера 1,5 часа на 15Гц
Измерить вязкость
Миксер на 2 часа на 10Гц
Вязкость должна быть 40-45
</div>

<div class="card highlight">
Утренняя смена начинает готовить краску, дневная доготавливает, вечерняя разливает ксилол по канистрам
</div>
`;
loadTasksPaint();
}

function renderSamples(){
app.innerHTML=`<div class="card"><img src="k3.jpg"></div>`;
}

function renderLine(){
app.innerHTML=`<div class="card"><img src="k1.jpg"></div>`;
}

function loadTasksOperator(){
let t = JSON.parse(localStorage.getItem("tasksOperator")||"[]");

document.getElementById("tasks").innerHTML=
t.map((x,i)=>`
<div class="task">
<span>${x.n}</span>
<label class="switch">
<input type="checkbox" ${x.d?"checked":""} onchange="toggleTaskOperator(${i})">
<span class="slider"></span>
</label>
</div>
`).join("");
}

function addTaskOperator(){
let v=document.getElementById("newTask").value;
if(!v)return;

let t=JSON.parse(localStorage.getItem("tasksOperator")||"[]");
t.push({n:v,d:false});

localStorage.setItem("tasksOperator",JSON.stringify(t));
document.getElementById("newTask").value="";
loadTasksOperator();
}

function toggleTaskOperator(i){
let t=JSON.parse(localStorage.getItem("tasksOperator")||"[]");
t[i].d=!t[i].d;
localStorage.setItem("tasksOperator",JSON.stringify(t));
loadTasksOperator();
}

function loadTasksPaint(){
let t = JSON.parse(localStorage.getItem("tasksPaint")||"[]");

document.getElementById("tasks").innerHTML=
t.map((x,i)=>`
<div class="task">
<span>${x.n}</span>
<label class="switch">
<input type="checkbox" ${x.d?"checked":""} onchange="toggleTaskPaint(${i})">
<span class="slider"></span>
</label>
</div>
`).join("");
}

function addTaskPaint(){
let v=document.getElementById("newTask").value;
if(!v)return;

let t=JSON.parse(localStorage.getItem("tasksPaint")||"[]");
t.push({n:v,d:false});

localStorage.setItem("tasksPaint",JSON.stringify(t));
document.getElementById("newTask").value="";
loadTasksPaint();
}

function toggleTaskPaint(i){
let t=JSON.parse(localStorage.getItem("tasksPaint")||"[]");
t[i].d=!t[i].d;
localStorage.setItem("tasksPaint",JSON.stringify(t));
loadTasksPaint();
}

renderHome();

</script>

</body>
</html>
