<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MirrorMaker</title>

<style>
body{margin:0;font-family:-apple-system;background:#f3fbff;}
header{
background:linear-gradient(135deg,#00bcd4,#007c91);
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:700;
cursor:pointer;
}

.container{padding:15px;max-width:600px;margin:auto;}

.card{
background:white;
border-radius:18px;
padding:15px;
margin-bottom:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.06);
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#00bcd4,#007c91);
color:white;
font-size:15px;
margin-top:10px;
}

input,select{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
margin-top:10px;
box-sizing:border-box;
}

img{width:100%;border-radius:12px;margin-top:10px;}

.sectionTitle{
font-weight:700;
border:2px solid #00bcd4;
padding:6px;
border-radius:8px;
margin-top:10px;
}

.sectionText{
font-style:italic;
margin-bottom:10px;
}

.task{
display:flex;
justify-content:space-between;
margin:8px 0;
}

</style>
</head>

<body>

<header onclick="goHome()">MirrorMaker</header>

<div class="container" id="app"></div>

<script>

/* ---------- НАВИГАЦИЯ ---------- */

function goHome(){
renderHome();
}

/* ---------- ГЛАВНОЕ МЕНЮ ---------- */

function renderHome(){
app.innerHTML=`
<div class="card"><button onclick="renderChemStart()">Химик</button></div>
<div class="card"><button onclick="renderOperator()">Оператор загрузки/выгрузки</button></div>
<div class="card"><button onclick="renderPaint()">Краска</button></div>
<div class="card"><button onclick="renderSamples()">Образцы</button></div>
<div class="card"><button onclick="renderLine()">Устройство линии</button></div>
`;
}

/* ---------- ХИМИК ---------- */

let shiftStart=0,shiftEnd=1440;

function renderChemStart(){
app.innerHTML=`
<div class="card">
<h3>Выбор смены</h3>
<select id="shift">
<option value="23-7">23-7</option>
<option value="21-9">21-9</option>
<option value="7-15">7-15</option>
</select>
<button onclick="startChem()">Продолжить</button>
</div>`;
}

function startChem(){
let val=document.getElementById("shift").value;
let map={"23-7":[23,7],"21-9":[21,9],"7-15":[7,15]};
let s=map[val];
shiftStart=s[0]*60;
shiftEnd=s[1]*60;
if(shiftEnd<=shiftStart) shiftEnd+=1440;

renderChem();
}

function fmt(m){
m=((m%1440)+1440)%1440;
return String(Math.floor(m/60)).padStart(2,'0')+":"+String(m%60).padStart(2,'0');
}

/* FIX ХИМИИ */
function calcChem(start){
if(start<shiftStart) start+=1440;

let arr=[];
for(let i=0;i<6;i++){
let t=start+i*240;
if(t>shiftEnd) break;
arr.push(fmt(t)+" — Приготовить химию");
}
return arr.join("<br>");
}

function calcSilan(start){
if(start<shiftStart) start+=1440;

let arr=[];
for(let i=0;i<20;i++){
let t=start+i*180;
if(t>shiftEnd) break;
arr.push(fmt(t)+" — Приготовить силан");
if(t+40<=shiftEnd){
arr.push(fmt(t+40)+" — Зарядить силан");
}
}
return arr.join("<br>");
}

function renderChem(){
app.innerHTML=`
<div class="card">
<h3>Химия</h3>
<input type="time" id="chem">
<button onclick="showChem()">Рассчитать</button>
<div id="chemRes"></div>
</div>

<div class="card">
<h3>Силан</h3>
<input type="time" id="silan">
<button onclick="showSilan()">Рассчитать</button>
<div id="silanRes"></div>
</div>

<div class="card">
<h3>Возможное время для обеда</h3>
<div id="lunch"></div>
</div>

<div class="card">
<h3>Задачи</h3>
<div id="tasks"></div>
<input id="taskInput">
<button onclick="addTask()">Добавить</button>
</div>

<div class="card">
ВАЖНО: Готовить порошок и доливать серебро в течение всей смены! Следить за системой EnviroFalk и EnvoChem
</div>

<div class="card">
<img src="k2.jpg">
</div>

<div class="card">
<button onclick="renderHome()">Новая смена</button>
</div>
`;
loadTasks();
}

function showChem(){
let v=document.getElementById("chem").value;
if(!v)return;
let [h,m]=v.split(":").map(Number);
document.getElementById("chemRes").innerHTML=calcChem(h*60+m);
}

function showSilan(){
let v=document.getElementById("silan").value;
if(!v)return;
let [h,m]=v.split(":").map(Number);
document.getElementById("silanRes").innerHTML=calcSilan(h*60+m);
}

/* ---------- TASKS ---------- */

function loadTasks(){
let t=JSON.parse(localStorage.getItem("t")||"[]");
document.getElementById("tasks").innerHTML=
t.map((x,i)=>`
<div class="task">
<span>${x}</span>
<button onclick="delTask(${i})">✔</button>
</div>`).join("");
}

function addTask(){
let v=document.getElementById("taskInput").value;
let t=JSON.parse(localStorage.getItem("t")||"[]");
t.push(v);
localStorage.setItem("t",JSON.stringify(t));
loadTasks();
}

function delTask(i){
let t=JSON.parse(localStorage.getItem("t"));
t.splice(i,1);
localStorage.setItem("t",JSON.stringify(t));
loadTasks();
}

/* ---------- ОПЕРАТОР ---------- */

function renderOperator(){
app.innerHTML=`
<div class="card"><h3>Задачи</h3><div id="tasks"></div><input id="taskInput"><button onclick="addTask()">Добавить</button></div>

<div class="card">
<button onclick="showMemo('robot')">Вывод робота в ручной режим</button>
<button onclick="showMemo('load')">Загрузка</button>
</div>`;
loadTasks();
}

function showMemo(type){
let text={
robot:"Выбрать режим T1 > R > Аннулировать программу > Выбрать формат стекла",
load:"Проверить ярлык\nНе брать брак\nЧастичный отбор"
};
app.innerHTML=`
<div class="card">${text[type]}</div>
<button onclick="renderOperator()">Назад</button>`;
}

/* ---------- КРАСКА ---------- */

function renderPaint(){
app.innerHTML=`
<div class="card"><h3>Задачи</h3><div id="tasks"></div><input id="taskInput"><button onclick="addTask()">Добавить</button></div>

<div class="card">
Миксер... (вся инструкция)
</div>`;
loadTasks();
}

/* ---------- ОБРАЗЦЫ ---------- */

function renderSamples(){
app.innerHTML=`<div class="card"><img src="k3.png"></div>`;
}

/* ---------- ЛИНИЯ ---------- */

function renderLine(){
app.innerHTML=`
<div class="card"><img src="k1.png"></div>

<div class="card">
<div class="sectionTitle">Секция предварительной мойки</div>
<div class="sectionText">Роликовая щетка и промывочная вода</div>
</div>`;
}

/* ---------- START ---------- */

renderHome();

</script>

</body>
</html>
