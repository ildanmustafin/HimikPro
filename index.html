<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HimikPro</title>

<style>
body{
margin:0;
font-family:-apple-system;
background:#f3fbff;
}

header{
background:linear-gradient(135deg,#00bcd4,#007c91);
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:700;
}

.container{padding:15px;}

.card{
background:white;
border-radius:18px;
padding:15px;
margin-bottom:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.06);
}

/* КНОПКИ */
button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#00e5ff,#00bcd4);
color:white;
font-size:15px;
margin-top:10px;
box-shadow:0 6px 15px rgba(0,188,212,0.25);
transition:0.2s;
}

button:active{
transform:scale(0.98);
}

/* INPUT */
input,select{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
margin-top:10px;
}

/* события */
.event{
padding:6px;
border-bottom:1px solid #eee;
}

/* 🔥 ТЁМНЫЙ СЕРЫЙ ДЛЯ ПРОШЕДШИХ */
.past{
color:#6f6f6f;
opacity:0.75;
}

/* задачи */
.task{
display:flex;
justify-content:space-between;
align-items:center;
margin:10px 0;
padding:8px 0;
border-bottom:1px solid #eee;
}

/* switch */
.switch{
position:relative;
width:46px;
height:24px;
display:inline-block;
}

.switch input{display:none;}

.slider{
position:absolute;
top:0;left:0;right:0;bottom:0;
background:#ccc;
border-radius:30px;
transition:.3s;
}

.slider:before{
content:"";
position:absolute;
width:18px;height:18px;
left:3px;bottom:3px;
background:white;
border-radius:50%;
transition:.3s;
}

input:checked + .slider{
background:#00bcd4;
}

input:checked + .slider:before{
transform:translateX(22px);
}
</style>
</head>

<body>

<header>HimikPro</header>

<div class="container">

<div class="card" id="shiftCard">
<h3>Выбор смены</h3>

<select id="shiftSelect">
<option value="7-15">7:00 - 15:00</option>
<option value="15-23">15:00 - 23:00</option>
<option value="23-7">23:00 - 7:00</option>
<option value="9-21">9:00 - 21:00</option>
<option value="21-9">21:00 - 9:00</option>
</select>

<button onclick="setShift()">Сохранить смену</button>
</div>

<div id="app" style="display:none;">

<div class="card">
<h3>Химия</h3>
<input type="time" id="chemTime">
<button onclick="setChem()">Рассчитать</button>
<div id="chemResult"></div>
</div>

<div class="card">
<h3>Силан</h3>
<input type="time" id="silanTime">
<button onclick="setSilan()">Рассчитать</button>
<div id="silanResult"></div>
</div>

<div class="card">
<h3>Задачи</h3>
<div id="tasks"></div>
<input type="text" id="newTask" placeholder="Новая задача">
<button onclick="addTask()">Добавить задачу</button>
</div>

<div class="card">
<button onclick="resetAll()">Новая смена</button>
</div>

</div>

<script>

/* SHIFT */
let shiftStart=0;
let shiftEnd=1440;

function setShift(){
localStorage.setItem("shift",document.getElementById("shiftSelect").value);
init();
}

function loadShift(){

const map={
"7-15":[7,15],
"15-23":[15,23],
"23-7":[23,7],
"9-21":[9,21],
"21-9":[21,9]
};

let s=map[localStorage.getItem("shift")];

if(!s){
shiftStart=0;
shiftEnd=1440;
return;
}

shiftStart=s[0]*60;
shiftEnd=s[1]*60;

if(shiftEnd<=shiftStart) shiftEnd+=1440;
}

function realEnd(){
return shiftEnd;
}

/* TIME */
function fmt(h,m){
return String(h).padStart(2,'0')+":"+String(m).padStart(2,'0');
}

function formatTime(min){
min=min%1440;
let h=Math.floor(min/60);
let m=min%60;
return fmt(h,m);
}

/* CHEM */
function setChem(){

let t=document.getElementById("chemTime").value;
if(!t)return;

let [h,m]=t.split(":").map(Number);
let start=h*60+m;

let end=realEnd();

let arr=[];

for(let i=0;i<20;i++){

let base=start+i*240;
if(base>=end)break;

arr.push({
time:formatTime(base),
text:"Приготовить химию"
});
}

localStorage.setItem("chem",JSON.stringify(arr));
render();
}

/* SILAN FIXED */
function setSilan(){

let t=document.getElementById("silanTime").value;
if(!t)return;

let [h,m]=t.split(":").map(Number);
let start=h*60+m;

let end=realEnd();

let arr=[];

for(let i=0;i<50;i++){

let base=start+i*180;
if(base>=end)break;

let charge=base+40;
if(charge>=end)break;

arr.push({
time:formatTime(base),
text:"Приготовить силан"
});

arr.push({
time:formatTime(charge),
text:"Зарядить силан"
});
}

localStorage.setItem("silan",JSON.stringify(arr));
render();
}

/* RENDER */
function render(){

let now=new Date();
let nowMin=now.getHours()*60+now.getMinutes();

/* FIX NIGHT SHIFT */
if(nowMin<shiftStart) nowMin+=1440;

function draw(list){

return list.map(e=>{

let [h,m]=e.time.split(":").map(Number);
let v=h*60+m;

if(v<shiftStart) v+=1440;

let past=v<nowMin;

return `<div class="event ${past?'past':''}">
${e.time} — ${e.text}
</div>`;
}).join("");
}

document.getElementById("chemResult").innerHTML=
draw(JSON.parse(localStorage.getItem("chem")||"[]"));

document.getElementById("silanResult").innerHTML=
draw(JSON.parse(localStorage.getItem("silan")||"[]"));

loadTasks();
}

/* TASKS */
function loadTasks(){

let t=JSON.parse(localStorage.getItem("tasks")||"null");

if(!Array.isArray(t)){
t=[
{n:"Обед",d:false},
{n:"Соль",d:false},
{n:"Щелочь",d:false},
{n:"Шлам",d:false}
];
localStorage.setItem("tasks",JSON.stringify(t));
}

document.getElementById("tasks").innerHTML=
t.map((x,i)=>`
<div class="task">
<span>${x.n}</span>
<label class="switch">
<input type="checkbox" ${x.d?'checked':''} onchange="toggle(${i})">
<span class="slider"></span>
</label>
</div>
`).join("");
}

function addTask(){
let v=document.getElementById("newTask").value;
if(!v)return;

let t=JSON.parse(localStorage.getItem("tasks")||"[]");
t.push({n:v,d:false});
localStorage.setItem("tasks",JSON.stringify(t));

document.getElementById("newTask").value="";
loadTasks();
}

function toggle(i){
let t=JSON.parse(localStorage.getItem("tasks"));
t[i].d=!t[i].d;
localStorage.setItem("tasks",JSON.stringify(t));
loadTasks();
}

/* RESET */
function resetAll(){
localStorage.clear();
init();
}

function init(){

let shift=localStorage.getItem("shift");

if(!shift){
document.getElementById("shiftCard").style.display="block";
document.getElementById("app").style.display="none";
return;
}

loadShift();

document.getElementById("shiftCard").style.display="none";
document.getElementById("app").style.display="block";

render();
}

init();

</script>

</body>
</html>
