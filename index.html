<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HimikPro</title>

<style>
body{margin:0;font-family:-apple-system;background:#f3fbff}

header{
background:linear-gradient(135deg,#00bcd4,#007c91);
color:#fff;
padding:18px;
text-align:center;
font-size:22px;
font-weight:700;
}

.container{padding:15px}

.card{
background:#fff;
border-radius:18px;
padding:15px;
margin-bottom:15px;
box-shadow:0 10px 25px rgba(0,0,0,.06);
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#00e5ff,#00bcd4);
color:#fff;
font-size:15px;
margin-top:10px;
}

input,select{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
margin-top:10px;
}

.event{padding:6px;border-bottom:1px solid #eee}
.past{color:#4a4a4a;opacity:.85}

/* tasks */
.task{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px 0;
border-bottom:1px solid #eee;
}

.switch{position:relative;width:46px;height:24px}
.switch input{display:none}

.slider{
position:absolute;inset:0;
background:#ccc;border-radius:30px;
}

.slider:before{
content:"";
position:absolute;
width:18px;height:18px;
left:3px;bottom:3px;
background:#fff;border-radius:50%;
transition:.2s;
}

input:checked + .slider{background:#00bcd4}
input:checked + .slider:before{transform:translateX(22px)}
</style>
</head>

<body>

<header>HimikPro</header>

<div class="container">

<div class="card" id="shiftBox">
<h3>Смена</h3>
<select id="shift">
<option value="7-15">7-15</option>
<option value="15-23">15-23</option>
<option value="23-7">23-7</option>
<option value="9-21">9-21</option>
<option value="21-9">21-9</option>
</select>
<button onclick="saveShift()">OK</button>
</div>

<div id="app" style="display:none">

<div class="card">
<h3>Химия</h3>
<input type="time" id="chemTime">
<button onclick="chem()">Расчитать</button>
<div id="chemOut"></div>
</div>

<div class="card">
<h3>Силан</h3>
<input type="time" id="silanTime">
<button onclick="silan()">Расчитать</button>
<div id="silanOut"></div>
</div>

<div class="card">
<h3>Задачи</h3>
<div id="tasks"></div>
<input id="newTask" placeholder="Добавить задачу">
<button onclick="addTask()">Добавить</button>
</div>

<div class="card">
<button onclick="reset()">Сброс смены</button>
</div>

</div>

<script>

/* SAFE STORAGE */
const get=(k,def)=>{try{return JSON.parse(localStorage.getItem(k))||def}catch(e){return def}}

/* SHIFT */
let start=0,end=1440;

function saveShift(){
localStorage.setItem("shift",document.getElementById("shift").value);
init();
}

function loadShift(){
const m={
"7-15":[7,15],
"15-23":[15,23],
"23-7":[23,7],
"9-21":[9,21],
"21-9":[21,9]
};

let s=m[localStorage.getItem("shift")];
if(!s){start=0;end=1440;return}

start=s[0]*60;
end=s[1]*60;
if(end<=start) end+=1440;
}

/* TIME */
const fmt=m=>String(Math.floor(m/60)%24).padStart(2,'0')+":"+String(m%60).padStart(2,'0')

/* CHEM */
function chem(){
let t=document.getElementById("chemTime").value;
if(!t)return;

let [h,m]=t.split(":").map(Number);
let s=h*60+m;

let arr=[];

for(let i=0;i<20;i++){
let v=s+i*240;
if(v>=end)break;

arr.push({t:fmt(v),txt:"Приготовить химию"});
}

localStorage.setItem("chem",JSON.stringify(arr));
render();
}

/* SILAN */
function silan(){
let t=document.getElementById("silanTime").value;
if(!t)return;

let [h,m]=t.split(":").map(Number);
let s=h*60+m;

let arr=[];

for(let i=0;i<50;i++){
let v=s+i*180;
if(v>=end)break;

let c=v+40;
if(c>=end)break;

arr.push({t:fmt(v),txt:"Приготовить силан"});
arr.push({t:fmt(c),txt:"Зарядить силан"});
}

localStorage.setItem("silan",JSON.stringify(arr));
render();
}

/* RENDER */
function render(){
let now=new Date();
let n=now.getHours()*60+now.getMinutes();

const draw=a=>a.map(e=>{
let p=fmtToMin(e.t)<n;
return `<div class="event ${p?'past':''}">${e.t} — ${e.txt}</div>`
}).join("");

document.getElementById("chemOut").innerHTML=draw(get("chem",[]));
document.getElementById("silanOut").innerHTML=draw(get("silan",[]));
loadTasks();
}

function fmtToMin(t){
let [h,m]=t.split(":").map(Number);
return h*60+m;
}

/* TASKS (ОБЕД ГАРАНТИРОВАН) */
function loadTasks(){
let t=get("tasks",null);

if(!Array.isArray(t)){
t=[
{n:"Обед",d:false},
{n:"Соль",d:false},
{n:"Щелочь",d:false},
{n:"Шлам",d:false}
];
localStorage.setItem("tasks",JSON.stringify(t));
}

document.getElementById("tasks").innerHTML=
t.map((x,i)=>`
<div class="task">
<span>${x.n}</span>
<label class="switch">
<input type="checkbox" ${x.d?'checked':''} onchange="toggle(${i})">
<span class="slider"></span>
</label>
</div>
`).join("");
}

function addTask(){
let v=document.getElementById("newTask").value;
if(!v)return;

let t=get("tasks",[]);
t.push({n:v,d:false});
localStorage.setItem("tasks",JSON.stringify(t));

document.getElementById("newTask").value="";
loadTasks();
}

function toggle(i){
let t=get("tasks",[]);
t[i].d=!t[i].d;
localStorage.setItem("tasks",JSON.stringify(t));
loadTasks();
}

/* RESET */
function reset(){
localStorage.clear();
init();
}

function init(){
let s=localStorage.getItem("shift");

if(!s){
document.getElementById("shiftBox").style.display="block";
document.getElementById("app").style.display="none";
return;
}

loadShift();

document.getElementById("shiftBox").style.display="none";
document.getElementById("app").style.display="block";

render();
}

init();

</script>

</body>
</html>
