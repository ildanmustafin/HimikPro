<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HimikPro 2.0</title>

<style>
body{
margin:0;
font-family:-apple-system;
background:#f3fbff;
}

header{
background:#00bcd4;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:700;
}

.container{padding:15px}

.card{
background:white;
border-radius:15px;
padding:15px;
margin-bottom:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#00bcd4;
color:white;
font-size:15px;
margin-top:10px;
}

input,select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
margin-top:10px;
}

.event{
padding:6px;
border-bottom:1px solid #eee;
}

.past{
color:#777;
opacity:0.8;
}

.task{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px 0;
border-bottom:1px solid #eee;
}

.switch{
position:relative;
width:46px;
height:24px;
}

.switch input{display:none}

.slider{
position:absolute;
inset:0;
background:#ccc;
border-radius:30px;
}

.slider:before{
content:"";
position:absolute;
width:18px;
height:18px;
left:3px;
bottom:3px;
background:white;
border-radius:50%;
transition:.2s;
}

input:checked + .slider{
background:#00bcd4;
}

input:checked + .slider:before{
transform:translateX(22px);
}
</style>
</head>

<body>

<header>HimikPro</header>

<div class="container">

<div class="card">
<h3>Химия</h3>
<input type="time" id="chemTime">
<button onclick="calcChem()">Рассчитать</button>
<div id="chemOut"></div>
</div>

<div class="card">
<h3>Силан</h3>
<input type="time" id="silanTime">
<button onclick="calcSilan()">Рассчитать</button>
<div id="silanOut"></div>
</div>

<div class="card">
<h3>Задачи</h3>
<div id="tasks"></div>
</div>

</div>

<script>

/* ===== TASKS (СТАБИЛЬНО) ===== */
function loadTasks(){

let t = JSON.parse(localStorage.getItem("tasks") || "null");

if(!Array.isArray(t)){
t=[
{n:"Обед",d:false},
{n:"Соль",d:false},
{n:"Щелочь",d:false},
{n:"Шлам",d:false}
];
localStorage.setItem("tasks",JSON.stringify(t));
}

document.getElementById("tasks").innerHTML =
t.map((x,i)=>`
<div class="task">
<span>${x.n}</span>
<label class="switch">
<input type="checkbox" ${x.d?'checked':''} onchange="toggle(${i})">
<span class="slider"></span>
</label>
</div>
`).join("");
}

function toggle(i){
let t = JSON.parse(localStorage.getItem("tasks"));
t[i].d = !t[i].d;
localStorage.setItem("tasks",JSON.stringify(t));
loadTasks();
}

/* ===== CHEM ===== */
function calcChem(){
let t=document.getElementById("chemTime").value;
if(!t)return;

let [h,m]=t.split(":").map(Number);
let start=h*60+m;

let arr=[];

for(let i=0;i<10;i++){
let v=start+i*240;
arr.push(format(v)+" — Приготовить химию");
}

document.getElementById("chemOut").innerHTML=
arr.map(e=>`<div class="event">${e}</div>`).join("");
}

/* ===== SILAN (СТАРАЯ ЛОГИКА БЕЗ СУТОК) ===== */
function calcSilan(){
let t=document.getElementById("silanTime").value;
if(!t)return;

let [h,m]=t.split(":").map(Number);
let start=h*60+m;

let arr=[];

for(let i=0;i<10;i++){
let v=start+i*180;
let c=v+40;

arr.push(format(v)+" — Приготовить силан");
arr.push(format(c)+" — Зарядить силан");
}

document.getElementById("silanOut").innerHTML=
arr.map(e=>`<div class="event">${e}</div>`).join("");
}

/* ===== TIME ===== */
function format(min){
min=min%1440;
let h=Math.floor(min/60);
let m=min%60;
return String(h).padStart(2,'0')+":"+String(m).padStart(2,'0');
}

loadTasks();

</script>

</body>
</html>
